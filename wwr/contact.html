<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is the contact page for my white water rafting website">
    <meta name="author" content="Mitchell Wilwand">
    <title>Contact Us Roaring Rapids Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/dryoar.png" alt="rafting logo">
        <nav>
            <a href="index.html" target="_blank">Home</a>
            <a href="about.html" target="_blank">About Us</a>
            <a href="trips.html" target="_blank">Trips</a>
            <a href="contact.html" target="_blank">Contact Us</a>
        </nav>
    </header>
    <main class="contact-page">

        <section class="company">
            <h3>Roaring Rapids Rafting</h3>
            <p>456 Mountain View Road</p>
            <p>Riverton, Washington</p>
            <p>+1 999 999 9999</p>
            <p>info@roaringrapidsrafting.com</p>
        </section>

        <section class="contact-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15920.313077395615!2d-116.74540518495647!3d45.13970181057217!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x54a6a390d3de05e5%3A0x105ba51021f82762!2sSnake%20River!5e0!3m2!1sen!2sus!4v1775934996569!5m2!1sen!2sus"
                  width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <form class="contact-form">
                <label>
                    Name
                    <input type="text" name="name" placeholder="placeholder" required>
                </label>
                <label>
                    Email
                    <input type="email" name="email" placeholder="Placeholder" required>
                </label>
                <fieldset>
                    <legend>Message Purpose</legend>
                    <label><input type="radio" name="purpose" value="general" checked> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="reservation"> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="suggestion"> Website
                        Suggestion</label>
                </fieldset>
                <label>
                    Message
                    <textarea name="message" placeholder="Type here" required></textarea>
                </label>
                <label class="checkbox">
                    <input type="checkbox" name="subscribe">
                    Subscribe to the monthly newsletter
                </label>
                <button type="submit">Send</button>
            </form>

        </section>
        <section class="team">
            <h2>We Are Here to Serve You</h2>

            <div class="team-grid">
                <div class="team-member">
                    <img src="images/riverguide1.jpg" alt="Employee">
                    <p>River guide</p>
                </div>

                <div class="team-member">
                    <img src="images/owner.jpg" alt="Employee">
                    <p>Owner</p>
                </div>

                <div class="team-member">
                    <img src="images/riverguide2.jpg" alt="Employee">
                    <p>River Guide</p>
                </div>
            </div>
        </section>

    </main>
    <footer>
        <p>©️ 2026 | Roaring Rapids Rafting | Mitchell Wilwand</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="facebook">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="isntagram">
            </a>
            <a href="https://x.com">
                <img src="images/twitter.png" alt="X(twitter)">
            </a>
        </nav>
    </footer>
</body>

</html>
